name: Deploy Convex

on:
  push:
    branches:
      - main
      - claude/file-analysis-KjCN6
    paths:
      - 'web/convex/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Convex CLI
        run: npm install -g convex@1.17.4

      - name: Deploy Convex
        run: convex deploy --typecheck disable
        working-directory: web
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
